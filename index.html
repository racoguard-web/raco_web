<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RACO — Cyberpunk Raccoon Agent</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #04050a; color: #e7f3ff; font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #canvas { position: fixed; inset: 0; }
    .overlay { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
    .card {
      pointer-events: auto;
      max-width: 660px; padding: 30px 34px; border-radius: 18px;
      background: rgba(6, 9, 16, 0.5);
      border: 1px solid rgba(120, 200, 255, 0.3);
      box-shadow: 0 20px 90px rgba(0,0,0,0.65), 0 0 60px rgba(90, 220, 255, 0.22);
      backdrop-filter: blur(12px);
    }
    h1 { margin: 0 0 10px; font-size: 30px; letter-spacing: 0.8px; }
    p { margin: 8px 0; line-height: 1.65; color: #cfe6ff; }
    .tag { display: inline-block; margin-top: 12px; padding: 6px 12px; border-radius: 999px; font-size: 12px; letter-spacing: .5px; background: rgba(0, 210, 255, 0.18); border: 1px solid rgba(0,210,255,0.4); }
    .footer { margin-top: 14px; font-size: 12px; color: #8fb7d8; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <div class="card">
      <h1>RACO — Cyberpunk Raccoon Agent</h1>
      <p>RACO is a cyberpunk raccoon coding agent powering an on-chain signal economy where humans and AI earn through high‑quality code and data.</p>
      <p>Signal first. Noise removed.</p>
      <div class="tag">AI • Signals • On‑chain</div>
      <div class="footer">Built for fast briefings, risk snapshots, and narrative pulse.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x04050a, 1);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x04050a, 6, 35);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 0.3, 9.5);

    const ambient = new THREE.AmbientLight(0x9ad7ff, 0.85);
    scene.add(ambient);
    const key = new THREE.PointLight(0x7ad0ff, 2.2, 80);
    key.position.set(7, 3, 8);
    scene.add(key);
    const rim = new THREE.PointLight(0x7a2bff, 1.1, 60);
    rim.position.set(-7, -2, -6);
    scene.add(rim);
    const magenta = new THREE.PointLight(0xff55e1, 0.5, 40);
    magenta.position.set(2, -4, 4);
    scene.add(magenta);

    // Glow texture
    const glowCanvas = document.createElement('canvas');
    glowCanvas.width = glowCanvas.height = 256;
    const gctx = glowCanvas.getContext('2d');
    const grd = gctx.createRadialGradient(128,128,10,128,128,120);
    grd.addColorStop(0, 'rgba(110,220,255,0.9)');
    grd.addColorStop(0.5, 'rgba(110,220,255,0.35)');
    grd.addColorStop(1, 'rgba(110,220,255,0.0)');
    gctx.fillStyle = grd; gctx.fillRect(0,0,256,256);
    const glowTex = new THREE.CanvasTexture(glowCanvas);

    // Earth textures
    const texLoader = new THREE.TextureLoader();
    const earthMap = texLoader.load('https://raw.githubusercontent.com/creotiv/threejs-globe/master/resources/earthmap4k.jpg');
    const earthBump = texLoader.load('https://raw.githubusercontent.com/creotiv/threejs-globe/master/resources/earthbump4k.jpg');
    const earthSpec = texLoader.load('https://raw.githubusercontent.com/creotiv/threejs-globe/master/resources/earthspec4k.jpg');
    const cloudMap = texLoader.load('https://raw.githubusercontent.com/creotiv/threejs-globe/master/resources/earthcloudmap.jpg');

    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(2.4, 96, 96),
      new THREE.MeshPhongMaterial({
        map: earthMap,
        bumpMap: earthBump,
        bumpScale: 0.09,
        specularMap: earthSpec,
        specular: new THREE.Color(0x4aa0ff),
        shininess: 18,
      })
    );
    scene.add(globe);

    // Clouds
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(2.44, 80, 80),
      new THREE.MeshLambertMaterial({ map: cloudMap, transparent: true, opacity: 0.45 })
    );
    scene.add(clouds);

    // Wireframe overlay
    const wire = new THREE.Mesh(
      new THREE.SphereGeometry(2.46, 40, 40),
      new THREE.MeshBasicMaterial({ color: 0x4bd9ff, wireframe: true, transparent: true, opacity: 0.2 })
    );
    scene.add(wire);

    // Atmosphere glow
    const glow = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: glowTex, color: 0x86e7ff, blending: THREE.AdditiveBlending, transparent: true, opacity: 1.0 })
    );
    glow.scale.set(9.0, 9.0, 1);
    scene.add(glow);

    // Stars (twinkle)
    const starCount = 3200;
    const positions = new Float32Array(starCount * 3);
    const phases = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      const r = 45 * Math.random();
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
      phases[i] = Math.random() * Math.PI * 2;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    starGeo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

    const starMat = new THREE.PointsMaterial({
      color: 0xcff1ff,
      size: 0.06,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // Shooting stars (streaks)
    const streakGeo = new THREE.BufferGeometry();
    const streaks = 80;
    const streakPos = new Float32Array(streaks * 3);
    const streakVel = [];
    for (let i = 0; i < streaks; i++) {
      streakPos[i*3] = (Math.random() - 0.5) * 60;
      streakPos[i*3+1] = (Math.random() - 0.5) * 40;
      streakPos[i*3+2] = -20 - Math.random() * 40;
      streakVel.push(0.08 + Math.random() * 0.15);
    }
    streakGeo.setAttribute('position', new THREE.BufferAttribute(streakPos, 3));
    const streakMat = new THREE.PointsMaterial({ color: 0x8ddcff, size: 0.12, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
    const streak = new THREE.Points(streakGeo, streakMat);
    scene.add(streak);

    // Near dust
    const dustCount = 700;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      dustPos[i * 3] = (Math.random() - 0.5) * 16;
      dustPos[i * 3 + 1] = (Math.random() - 0.5) * 10;
      dustPos[i * 3 + 2] = (Math.random() - 0.5) * 12;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dust = new THREE.Points(
      dustGeo,
      new THREE.PointsMaterial({ color: 0x7fdcff, size: 0.02, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending })
    );
    scene.add(dust);

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.006;
      globe.rotation.y += 0.0016;
      clouds.rotation.y += 0.0024;
      wire.rotation.y += 0.0022;
      stars.rotation.y += 0.0007;
      stars.rotation.x += 0.0002;
      dust.rotation.y -= 0.0005;
      glow.material.opacity = 0.85 + Math.sin(t) * 0.2;

      // twinkle effect
      const p = starGeo.attributes.position.array;
      // lightweight opacity pulse via material
      starMat.opacity = 0.85 + Math.sin(t * 1.5) * 0.1;

      // shooting stars
      const sp = streakGeo.attributes.position.array;
      for (let i = 0; i < streaks; i++) {
        sp[i*3] -= streakVel[i];
        sp[i*3+1] += streakVel[i] * 0.3;
        if (sp[i*3] < -35) {
          sp[i*3] = 35 + Math.random() * 10;
          sp[i*3+1] = (Math.random() - 0.5) * 30;
          sp[i*3+2] = -20 - Math.random() * 40;
        }
      }
      streakGeo.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
